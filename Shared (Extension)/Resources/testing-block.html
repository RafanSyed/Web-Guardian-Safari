<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hold On</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: #fdf6ee;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fffcf7;
      border: 1px solid #e8d9c4;
      border-radius: 6px;
      max-width: 420px;
      width: 100%;
      padding: 2.5rem 2rem;
    }
    .eyebrow {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #b89c7a;
      margin-bottom: 1.25rem;
    }
    .headline {
      font-size: 1.15rem;
      font-weight: 400;
      color: #5c4a30;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .divider {
      border: none;
      border-top: 1px solid #e8d9c4;
      margin: 1.5rem 0;
    }
    .body-text {
      font-size: 14px;
      color: #7a6347;
      line-height: 1.9;
      margin-bottom: 1.5rem;
    }
    .grounding {
      font-size: 13px;
      color: #a08060;
      line-height: 1.9;
      padding-left: 1rem;
      border-left: 2px solid #e0c9a8;
      margin-bottom: 1.75rem;
    }
    .close-line {
      font-size: 15px;
      font-style: italic;
      color: #8a6e4e;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">hold on</div>
    <div class="headline">You just spent the last few minutes trying to find a way around your own system.</div>
    <hr class="divider">
    <div class="body-text">
      That's the craving talking — not you.<br>
      It feels urgent. It isn't.
    </div>
    <div class="grounding">
      Feel your feet on the floor.<br>
      Notice the air temperature in the room.<br>
      Take one slow breath out.
    </div>
    <div class="close-line">
      You already know this isn't worth it.
    </div>
  </div>
</body>
</html>
